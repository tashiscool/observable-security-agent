schema_version: "1.0"
# Per-KSI evidence expectations: ties KSI catalog themes to concrete registry ids and agent outputs.
ksi_evidence:
  KSI-IAM-01:
    required_evidence_sources:
      - identity_provider_users
      - siem_alert_rule_export
      - incident_ticket_export
      - correlation_assessment_export
    optional_evidence_sources:
      - privileged_group_membership
      - mfa_status
      - scim_provisioning_logs
      - aws_iam_credential_report
      - cloud_control_plane_events
      - central_log_source_export
    machine_evidence:
      - identity_provider_users
      - siem_alert_rule_export
      - cloud_control_plane_events
      - central_log_source_export
      - correlation_assessment_export
      - aws_iam_credential_report
    human_evidence:
      - incident_ticket_export
      - mfa_status
      - privileged_group_membership
    validation_outputs:
      - CROSS_DOMAIN_EVENT_CORRELATION
      - SI4_ALERT_INSTRUMENTATION
    report_sections:
      assessor: Identity and privileged access evidence
      executive: IAM posture summary
      ao: AC / IA family KSI rollup

  KSI-LOG-01:
