    default_remediation: Require authn/z, WAF, IP allowlists; separate admin from customer-facing endpoints.
    generated_query_keywords: [admin, "/admin", "443", servlet, console]

# ElectricEye / regex fallback rules (substring + title) — merged with per-service match_check_id_substrings.
rules:
  - id: admin_port_from_internet
    semantic_type: network.public_admin_port_opened
    match_check_id_substrings:
      - "port_22"
      - "port_3389"
      - "ssh"
      - "rdp"
      - "security-group-22"
      - "security-group-rdp"
      - "telnet"
      - "security-group-telnet"
    match_title_regex: "(?i)(ssh|rdp|3389|port\\s*22|0\\.0\\.0\\.0/0.*22|admin)"

  - id: database_from_internet
    semantic_type: network.public_database_port_opened
    match_check_id_substrings:
      - "port_3306"
      - "port_5432"
      - "port_1433"
      - "port_1521"
      - "mysql"
      - "postgresql"
      - "mssql"
      - "oracledb"
    match_title_regex: "(?i)(mysql|postgres|mssql|oracle|3306|5432|1433|1521|rds|documentdb|mongo|redshift)"

  - id: sensitive_service_from_internet
    semantic_type: network.public_sensitive_service_opened
    match_check_id_substrings:
      - "kafka"
      - "docker"
      - "k8s"
      - "k8sapi"
      - "rabbitmq"
      - "elastic"
      - "nfs"
      - "smtp"
      - "splunk"
      - "jenkins"
      - "memcached"
      - "openvpn"
    match_title_regex: "(?i)(kubernetes|kubelet|6443|docker\\s*api|2375|kafka|elasticsearch|kibana|opensearch|redis|splunk|rabbitmq|amazonmq|nfs|2049|smtp|memcached|jenkins)"

# Per-semantic exposure_rank used when summarizing CloudTrail AuthorizeSecurityGroupIngress (worst-wins).
exposure_rank:
  network.public_admin_port_opened: 50
  network.public_database_port_opened: 40
  network.public_sensitive_service_opened: 35
  network.firewall_rule_changed: 10
