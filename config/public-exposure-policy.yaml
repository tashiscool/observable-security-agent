# Public exposure & recon semantics — provider-neutral policy (AWS SG today; Azure NSG / GCP firewall later).
# Reference harvest: docs/public_exposure_reference_harvest.md
# Port/check alignment: reference_samples/electriceye/checks/electriceye_secgroup_auditor_config.json
schema_version: "2.0"
description: >
  Maps well-known listening ports and scanner check metadata to SemanticType values.
  AWS security-group and CloudTrail normalizers resolve ports via semantic_type_for_exposed_port();
  Azure/GCP adapters can share the same catalog.

services:
  - service_name: ssh
    ports: [22]
    semantic_type: network.public_admin_port_opened
    severity: critical
    controls: [SC-7, SC-7(3), CM-7, AC-17]
    linked_ksi_ids: [KSI-INV-01, KSI-LOG-01, KSI-CM-01, KSI-VULN-01]
    alert_required: true
    scanner_required: true
    exploitation_review_required_if_vulnerable: true
    default_remediation: Remove 0.0.0.0/0 ingress on 22; use SSM/session manager, bastion, or VPN with MFA.
    generated_query_keywords: [ssh, "port 22", "0.0.0.0/0", AuthorizeSecurityGroupIngress, "security-group-22"]
    match_check_id_substrings: ["security-group-22", "port_22", "ssh", "electriceye_secgroup"]

  - service_name: rdp
    ports: [3389]
    semantic_type: network.public_admin_port_opened
    severity: critical
    controls: [SC-7, SC-7(3), CM-7, AC-17]
    linked_ksi_ids: [KSI-INV-01, KSI-LOG-01, KSI-CM-01, KSI-VULN-01]
    alert_required: true
    scanner_required: true
    exploitation_review_required_if_vulnerable: true
    default_remediation: Restrict RDP with VPN/Zero Trust; disable 0.0.0.0/0; enforce NLA and patching.
    generated_query_keywords: [rdp, "3389", "security-group-rdp"]
    match_check_id_substrings: ["security-group-rdp", "rdp", "3389"]

  - service_name: telnet
    ports: [23]
    semantic_type: network.public_admin_port_opened
    severity: critical
    controls: [SC-7, CM-7, AC-17]
    linked_ksi_ids: [KSI-INV-01, KSI-LOG-01, KSI-CM-01]
    alert_required: true
    scanner_required: true
    exploitation_review_required_if_vulnerable: true
    default_remediation: Disable Telnet; replace with SSH over private paths only.
    generated_query_keywords: [telnet, "port 23", "security-group-telnet"]
    match_check_id_substrings: ["telnet", "security-group-telnet"]

  - service_name: ftp
    ports: [20, 21]
    semantic_type: network.public_admin_port_opened
    severity: high
    controls: [SC-7, CM-7, AC-17]
    linked_ksi_ids: [KSI-INV-01, KSI-LOG-01, KSI-CM-01]
    alert_required: true
    scanner_required: true
    exploitation_review_required_if_vulnerable: true
    default_remediation: Block anonymous FTP; use SFTP/FTPS behind private connectivity only.
    generated_query_keywords: [ftp, "port 21", ftps]
    match_check_id_substrings: ["ftp", "security-group-ftp"]

  - service_name: smtp
    ports: [25, 465, 587]
    semantic_type: network.public_sensitive_service_opened
    severity: high
    controls: [SC-7, CM-7, AC-4]
    linked_ksi_ids: [KSI-INV-01, KSI-LOG-01, KSI-VULN-01]
    alert_required: true
    scanner_required: true
    exploitation_review_required_if_vulnerable: true
    default_remediation: Relay through approved mail gateways; restrict ingress to postmaster paths.
    generated_query_keywords: [smtp, "port 25", "security-group-smtp", "Secure Mail Transfer"]
    match_check_id_substrings: ["smtp", "security-group-smtp"]

  - service_name: smb
    ports: [139, 445]
    semantic_type: network.public_sensitive_service_opened
    severity: critical
    controls: [SC-7, CM-7, AC-4]
    linked_ksi_ids: [KSI-INV-01, KSI-LOG-01, KSI-VULN-01]
    alert_required: true
    scanner_required: true
    exploitation_review_required_if_vulnerable: true
    default_remediation: Never expose SMB to the internet; isolate behind VPN/private endpoints.
    generated_query_keywords: [smb, "port 445", netbios, "security-group-winnetbios"]
    match_check_id_substrings: ["netbios", "smb", "winnetbios", "security-group-winnetbios"]

  - service_name: microsoft_sql_server
    ports: [1433, 1434]
    semantic_type: network.public_database_port_opened
    severity: critical
    controls: [SC-7, CM-7, AC-4]
