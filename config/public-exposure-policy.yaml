    generated_query_keywords: [cassandra, keyspaces, "9142", "security-group-cassandra"]
    match_check_id_substrings: ["cassandra", "keyspaces", "security-group-cassandra"]

  - service_name: mongodb_documentdb
    ports: [27017]
    semantic_type: network.public_database_port_opened
    severity: critical
    controls: [SC-7, CM-7, AC-4]
    linked_ksi_ids: [KSI-INV-01, KSI-LOG-01, KSI-VULN-01]
    alert_required: true
    scanner_required: true
    exploitation_review_required_if_vulnerable: true
    default_remediation: Enable auth; remove 0.0.0.0/0; use VPC peering or PrivateLink.
    generated_query_keywords: [mongodb, documentdb, "27017", "security-group-documentdb"]
    match_check_id_substrings: ["mongo", "documentdb", "security-group-documentdb"]

  - service_name: redis
    ports: [6379, 6380]
    semantic_type: network.public_sensitive_service_opened
    severity: critical
    controls: [SC-7, CM-7, AC-4]
    linked_ksi_ids: [KSI-INV-01, KSI-LOG-01, KSI-VULN-01]
